# Management configuration
enabled: true
replicas: 1

image:
  repository: "netbirdio/management"
  tag: "0.50.1"
  pullPolicy: IfNotPresent

store:
  engine: "sqlite" # or "postgres"

securityContext: {}

service:
  type: ClusterIP
  port: 443

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

persistence:
  enabled: true
  storageClass: ""
  etc:
    size: "100Mi"
  var:
    size: "1Gi"

# Ingress configuration
ingress:
  enabled: true
  className: ""
  annotations: {}
  tls:
    secretName: "netbird-tls"

{{/*
Proxy ingress needs TLS passthrough - the proxy handles its own TLS/ACME.
For nginx-ingress, use: nginx.ingress.kubernetes.io/ssl-passthrough: "true"
*/}}
{{- if and .Values.enabled .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "proxy.fullname" . }}
  labels:
    {{- include "proxy.labels" . | nindent 4 }}
  annotations:
    # TLS passthrough required - proxy handles its own certificates
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className | default .Values.global.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "proxy.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}

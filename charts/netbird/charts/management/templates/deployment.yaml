{{- if .Values.enabled }}
# Management Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "management.fullname" . }}
  labels:
    {{- include "management.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "management.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "management.selectorLabels" . | nindent 8 }}
    spec:
      {{- if include "netbird.postgresql.enabled" . }}
      initContainers:
        - name: wait-for-db
          image: "busybox:1.36"
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at {{ include "netbird.postgresql.host" . }}:{{ include "netbird.postgresql.port" . }}..."
              until nc -w2 {{ include "netbird.postgresql.host" . }} {{ include "netbird.postgresql.port" . }}; do
                echo "PostgreSQL not ready, retrying in 3s..."
                sleep 3
              done
              echo "PostgreSQL is ready!"
      {{- end }}
      containers:
        - name: management
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - management
            - --port
            - {{ .Values.service.port | quote }}
            - --log-file
            - console
            - --log-level
            - {{ .Values.global.netbird.management.logLevel | default "info" }}
            - --dns-domain
            - {{ .Values.global.netbird.management.dnsDomain | default "netbird.selfhosted" }}
            {{- if .Values.global.netbird.management.singleAccountModeDomain }}
            - --single-account-mode-domain
            - {{ .Values.global.netbird.management.singleAccountModeDomain | quote }}
            {{- end }}
            {{- if not .Values.global.netbird.management.anonymousMetrics.enabled }}
            - --disable-anonymous-metrics=true
            {{- end }}
          env:
            - name: TZ
              value: {{ $.Values.global.timezone | quote }}
          envFrom:
            # Non-sensitive configuration from ConfigMap
            - configMapRef:
                name: {{ include "management.fullname" . }}-config
            # Sensitive configuration from Secret
            - secretRef:
                name: {{ include "management.fullname" . }}-secrets
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: management-etc
              mountPath: /etc/netbird
            - name: management-config
              mountPath: /etc/netbird/management.json
              subPath: management.json
            - name: management-var
              mountPath: /var/lib/netbird
      volumes:
        - name: management-etc
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "management.fullname" . }}-etc
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: management-config
          configMap:
            name: {{ include "management.fullname" . }}-config
        - name: management-var
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "management.fullname" . }}-var
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}

{{/*
Dashboard ingress is skipped when unified ingress mode is enabled.
*/}}
{{- $globalIngress := $.Values.global.netbird.ingress | default dict -}}
{{- $subchartIngress := .Values.ingress | default dict -}}
{{- $ingress := merge $subchartIngress $globalIngress -}}

{{- if and $ingress.enabled (not $globalIngress.unified) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dashboard.fullname" . }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
  {{- with $ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if $ingress.className }}
  ingressClassName: {{ $ingress.className }}
  {{- end }}
  {{- if $ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $.Values.global.netbird.fqdn | quote }}
      {{- with $ingress.tls.secretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ $.Values.global.netbird.fqdn | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dashboard.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}

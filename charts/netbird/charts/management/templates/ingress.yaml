{{/*
Management ingress is skipped when unified ingress mode is enabled
(parent chart handles all routing on a single domain).
*/}}
{{- $globalIngress := $.Values.global.netbird.ingress | default dict -}}
{{- $subchartIngress := .Values.global.netbird.management.ingress | default dict -}}
{{- $ingress := merge $subchartIngress $globalIngress -}}

{{- if and $ingress.enabled (not $globalIngress.unified) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "management.fullname" . }}
  labels:
    {{- include "management.labels" . | nindent 4 }}
  {{- with $ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if $ingress.className }}
  ingressClassName: {{ $ingress.className }}
  {{- end }}
  {{- if $ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $ingress.host | quote }}
      {{- with $ingress.tls.secretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ $ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "management.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}

{{- if .Values.enabled }}
# Relay Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "relay.fullname" . }}
  labels:
    {{- include "relay.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "relay.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "relay.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: relay
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: TZ
              value: {{ $.Values.global.timezone | quote }}
          envFrom:
            # Non-sensitive configuration from ConfigMap
            - configMapRef:
                name: {{ include "relay.fullname" . }}-config
            # Sensitive configuration from Secret
            - secretRef:
                name: {{ include "relay.fullname" . }}-secrets
          ports:
            - name: relay
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: health
              containerPort: 9000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: health
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts: []
      volumes: []
{{- end }}

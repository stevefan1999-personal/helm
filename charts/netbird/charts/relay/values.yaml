# Relay configuration
enabled: true
replicas: 1

image:
  repository: "netbirdio/relay"
  tag: "0.67.0"
  pullPolicy: IfNotPresent

securityContext: {}

service:
  type: ClusterIP
  port: 443

# Log level for the relay server (debug, info, warn, error).
logLevel: "info"

# Health check listen address inside the container.
healthListenAddress: ":9000"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

# Ingress configuration
ingress:
  enabled: true
  className: ""
  annotations: {}
  tls:
    secretName: "netbird-tls"

# Signal configuration
enabled: true
replicas: 1

image:
  repository: "netbirdio/signal"
  tag: "0.50.1"
  pullPolicy: IfNotPresent

securityContext: {}

service:
  type: ClusterIP
  # Signal listens on port 80 by default (HTTP + gRPC multiplexed).
  # Port 10000 is the legacy gRPC-only port (auto-started separately).
  port: 80

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

persistence:
  enabled: true
  storageClass: ""
  var:
    size: "100Mi"

# Ingress configuration
ingress:
  enabled: true
  className: ""
  annotations: {}
  tls:
    secretName: "netbird-tls"

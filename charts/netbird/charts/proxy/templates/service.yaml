{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "proxy.fullname" . }}
  labels:
    {{- include "proxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
      name: https
    - port: 8080
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "proxy.selectorLabels" . | nindent 4 }}
{{- end }}

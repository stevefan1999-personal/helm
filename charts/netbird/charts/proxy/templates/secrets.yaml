{{/*
Secret is only created here if a token is explicitly provided.
When no token is set, the token-job creates the secret post-install.
*/}}
{{- if and .Values.enabled (not .Values.existingSecret) .Values.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "proxy.fullname" . }}-proxy-secrets
  labels:
    {{- include "proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  NB_PROXY_TOKEN: {{ .Values.token | quote }}
{{- end }}

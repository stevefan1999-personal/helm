{{- if .Values.enabled }}
# Signal Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "signal.fullname" . }}
  labels:
    {{- include "signal.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "signal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "signal.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: signal
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --port
            - {{ .Values.service.port | quote }}
            - --log-file
            - console
            - --log-level
            - {{ .Values.global.netbird.signal.logLevel | default "info" }}
          env:
            - name: TZ
              value: {{ $.Values.global.timezone | quote }}
          ports:
            - name: signal
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: signal
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            tcpSocket:
              port: signal
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: signal-var
              mountPath: /var/lib/netbird
      volumes:
        - name: signal-var
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "signal.fullname" . }}-var
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
